name: Mephia 续期
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 */5 * *'   # 每5天 UTC 02:00 执行

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🛡️ 启动 Gost 代理
        if: env.GOST_PROXY != ''
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          mv gost-linux-amd64-2.11.5 gost
          nohup ./gost -L http://:8080 -F ${{ secrets.GOST_PROXY }} > gost.log 2>&1 &
          sleep 3
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org

      - name: 🔧 执行续期
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: bash mephia_renew.sh
