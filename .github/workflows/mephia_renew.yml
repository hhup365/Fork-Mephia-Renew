name: Mephia 续期

on:
  workflow_dispatch:
  schedule:
    - cron: '10 22 */5 * *'   # 每5天 UTC 02:00 执行

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write   # ⭐ 必须：允许 push time.txt

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org

      - name: 🔧 执行续期
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: bash mephia_renew.sh

      # ================= 新增 Step =================
      - name: 🕒 Keep Actions Alive (time.txt)
        if: always()
        run: |
          echo "$(date '+%Y-%m-%d %H:%M:%S')" > time.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add time.txt
          git commit -m "chore: update time.txt to keep actions alive" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
